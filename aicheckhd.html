<html>
<head>

<body>
  <div class="chat-wrapper">
    <div class="chat-header">
      <div class="ai-avatar">🏸</div>
      <div class="chat-title">
        <h3>HLV AI CẦU LÔNG</h3>
        <span class="status-online">Trực tuyến</span>
      </div>
    </div>

    <div class="chat-body" id="chatBody">
      <div class="message ai-message">
        <div class="message-content">
          Chào em! Thầy là AI hướng dẫn chuyên môn. Hãy nhấn vào biểu tượng kẹp giấy 📎 để gửi video bài tập, thầy sẽ nhận xét kỹ thuật cho em nhé!
        </div>
      </div>

    <div class="chat-input-area">
      <label for="videoFile" class="attach-btn" title="Đính kèm video">

      <input type="file" id="videoFile" accept="video/*" onchange="handleFileSelect()" style="display: none;">
      
      <input type="text" id="fileNameDisplay" placeholder="Chọn video bài tập của em..." readonly>
      
      <button id="sendBtn" onclick="processUpload()" disabled title="Gửi cho AI">
